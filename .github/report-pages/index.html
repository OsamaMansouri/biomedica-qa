<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Biomedica QA Reports</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f8fa;
      --surface: #ffffff;
      --text: #1f2328;
      --muted: #656d76;
      --border: #d0d7de;
      --link: #0969da;
      --shadow: 0 1px 3px rgba(31, 35, 40, 0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --text: #e6edf3;
        --muted: #8b949e;
        --border: #30363d;
        --link: #58a6ff;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 42rem;
      margin: 0 auto;
      padding: 3rem 1.25rem 4rem;
    }
    .eyebrow {
      margin: 0 0 0.35rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 600;
    }
    .lead {
      margin: 0 0 2rem;
      color: var(--muted);
      font-size: 1rem;
    }
    .cards {
      display: grid;
      gap: 1rem;
    }
    .card {
      display: block;
      padding: 1.15rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    .card:hover {
      border-color: var(--link);
      transform: translateY(-1px);
    }
    .card strong {
      display: block;
      margin-bottom: 0.25rem;
      font-size: 1.05rem;
      color: var(--link);
    }
    .card span {
      color: var(--muted);
      font-size: 0.92rem;
    }
    .note {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <p class="eyebrow">Biomedica QA</p>
      <h1>Test reports</h1>
      <p class="lead">Allure results from GitHub Actions. Open a suite to see trends over time.</p>
    </header>
    <nav class="cards" aria-label="Report suites">
      <a class="card" href="smoke-fr/">
        <strong>Smoke FR</strong>
        <span>Every push (PR gate)</span>
      </a>
      <a class="card" href="smoke-en/">
        <strong>Smoke EN</strong>
        <span>Nightly parity</span>
      </a>
      <a class="card" href="e2e-fr/">
        <strong>E2E FR</strong>
        <span>Nightly (checkout flows)</span>
      </a>
      <a class="card" href="e2e-en/">
        <strong>E2E EN</strong>
        <span>Weekly (Monday)</span>
      </a>
    </nav>
    <p class="note">In Allure, use the <strong>Graphs</strong> and <strong>Timeline</strong> tabs for history after several runs.</p>
  </main>
</body>
</html>
