<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Biomedica QA — Allure reports</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f4f5f7;
        color: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      main {
        width: 100%;
        max-width: 520px;
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.35rem;
        font-weight: 600;
      }
      p.lead {
        margin: 0 0 1.5rem;
        color: #555;
        font-size: 0.95rem;
        line-height: 1.45;
      }
      .grid {
        display: grid;
        gap: 0.75rem;
      }
      a.card {
        display: block;
        padding: 1rem 1.15rem;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        text-decoration: none;
        color: inherit;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      a.card:hover {
        border-color: #0969da;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      a.card strong {
        display: block;
        font-size: 1.05rem;
        margin-bottom: 0.25rem;
        color: #0969da;
      }
      a.card span {
        font-size: 0.875rem;
        color: #555;
      }
      footer {
        margin-top: 1.25rem;
        font-size: 0.8rem;
        color: #777;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Biomedica QA</h1>
      <p class="lead">
        Hub only — open a suite for the full Allure report (graphs, failures, traces).
      </p>
      <div class="grid">
        <a class="card" href="smoke-fr/">
          <strong>Smoke FR</strong>
          <span>Every push (PR gate) + nightly</span>
        </a>
        <a class="card" href="e2e-fr/">
          <strong>E2E FR</strong>
          <span>Nightly (checkout flows)</span>
        </a>
      </div>
      <footer>Updated by QA CI / QA Nightly → publish-report</footer>
    </main>
  </body>
</html>
