# Push/PR — fast gate: typecheck + smoke FR + publish (FR report only; EN/E2E kept via site cache).
name: QA CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qa-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PLAYWRIGHT_ORIGIN: ${{ vars.PLAYWRIGHT_ORIGIN || 'https://biomedica-test.netlify.app' }}
  PLAYWRIGHT_API_BASE_URL: ${{ vars.PLAYWRIGHT_API_BASE_URL || 'https://api.biomedica.ma' }}
  PLAYWRIGHT_TEST_PRODUCT_SLUG: ${{ vars.PLAYWRIGHT_TEST_PRODUCT_SLUG || 'argan-et-figue-de-barbarie-60ml' }}
  PLAYWRIGHT_WORKERS: "1"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - name: Typecheck Playwright specs
        run: npm ci --prefix playwright && npm run typecheck --prefix playwright

  smoke-fr:
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - uses: ./.github/actions/playwright-chromium
      - name: Smoke (FR) on Netlify storefront
        working-directory: playwright
        env:
          CI: "true"
        run: npm run test:smoke:fr
      - uses: ./.github/actions/allure-with-history
        if: always() && hashFiles('playwright/reports/allure-results') != ''
        with:
          cache_prefix: allure-history-smoke-fr
      - uses: actions/upload-artifact@v4
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        with:
          name: allure-report-smoke-fr
          path: playwright/reports/allure-report/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-smoke-fr
          path: playwright/test-results/

  publish-report:
    needs: [smoke-fr]
    if: always() && needs.smoke-fr.result != 'cancelled'
    uses: ./.github/workflows/reusable-publish-report.yml
    with:
      download_suites: smoke-fr
    permissions:
      contents: read
      pages: write
      id-token: write
