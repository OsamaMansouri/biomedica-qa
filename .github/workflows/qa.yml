# QA repo — all jobs on GitHub cloud. Storefront: Netlify preview; API: api.biomedica.ma.
name: QA

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
  schedule:
    # Nightly full E2E (03:00 UTC). Creates real COD orders on prod API.
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PLAYWRIGHT_ORIGIN: ${{ vars.PLAYWRIGHT_ORIGIN || 'https://biomedica-test.netlify.app' }}
  PLAYWRIGHT_API_BASE_URL: ${{ vars.PLAYWRIGHT_API_BASE_URL || 'https://api.biomedica.ma' }}
  PLAYWRIGHT_TEST_PRODUCT_SLUG: ${{ vars.PLAYWRIGHT_TEST_PRODUCT_SLUG || 'argan-et-figue-de-barbarie-60ml' }}
  PLAYWRIGHT_WORKERS: "1"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - name: Typecheck Playwright specs
        run: npm ci --prefix playwright && npm run typecheck --prefix playwright

  smoke:
    needs: [typecheck]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - uses: ./.github/actions/playwright-chromium
      - name: Smoke (FR) on Netlify storefront
        working-directory: playwright
        env:
          CI: "true"
        run: npm run test:smoke:fr
      - uses: ./.github/actions/allure-report
        if: always() && hashFiles('playwright/reports/allure-results') != ''
      - name: Publish Allure report (GitHub Pages)
        uses: peaceiris/actions-gh-pages@v4
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: playwright/reports/allure-report
          destination_dir: smoke
          keep_files: true
      - name: Allure report link
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        run: |
          echo "### Allure smoke report" >> "$GITHUB_STEP_SUMMARY"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/smoke/" >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-smoke
          path: playwright/test-results/

  e2e:
    needs: [smoke]
    if: ${{ vars.ENABLE_PLAYWRIGHT_E2E == 'true' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - uses: ./.github/actions/playwright-chromium
      - name: Full suite (FR) — creates real COD orders on prod
        working-directory: playwright
        env:
          CI: "true"
        run: npm run test:ci:fr
      - uses: ./.github/actions/allure-report
        if: always() && hashFiles('playwright/reports/allure-results') != ''
      - name: Publish Allure report (GitHub Pages)
        uses: peaceiris/actions-gh-pages@v4
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: playwright/reports/allure-report
          destination_dir: e2e
          keep_files: true
      - name: Allure report link
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        run: |
          echo "### Allure e2e report" >> "$GITHUB_STEP_SUMMARY"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/e2e/" >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-e2e
          path: playwright/test-results/
