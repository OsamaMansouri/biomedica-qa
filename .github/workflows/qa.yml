# QA repo — all jobs on GitHub cloud. Storefront: Netlify preview; API: api.biomedica.ma.
name: QA

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
  schedule:
    # Nightly E2E (03:00 UTC). Creates real COD orders on prod API.
    - cron: "0 3 * * *"
    # EN smoke parity (Monday 04:00 UTC).
    - cron: "0 4 * * 1"

permissions:
  contents: read

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PLAYWRIGHT_ORIGIN: ${{ vars.PLAYWRIGHT_ORIGIN || 'https://biomedica-test.netlify.app' }}
  PLAYWRIGHT_API_BASE_URL: ${{ vars.PLAYWRIGHT_API_BASE_URL || 'https://api.biomedica.ma' }}
  PLAYWRIGHT_TEST_PRODUCT_SLUG: ${{ vars.PLAYWRIGHT_TEST_PRODUCT_SLUG || 'argan-et-figue-de-barbarie-60ml' }}
  PLAYWRIGHT_WORKERS: "1"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - name: Typecheck Playwright specs
        run: npm ci --prefix playwright && npm run typecheck --prefix playwright

  smoke:
    needs: [typecheck]
    if: github.event_name != 'schedule' || github.event.schedule != '0 4 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - uses: ./.github/actions/playwright-chromium
      - name: Smoke (FR) on Netlify storefront
        working-directory: playwright
        env:
          CI: "true"
        run: npm run test:smoke:fr
      - uses: ./.github/actions/allure-with-history
        if: always() && hashFiles('playwright/reports/allure-results') != ''
        with:
          cache_prefix: allure-history-smoke
      - uses: actions/upload-artifact@v4
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        with:
          name: allure-report-smoke
          path: playwright/reports/allure-report/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-smoke
          path: playwright/test-results/

  smoke-en:
    needs: [typecheck]
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - uses: ./.github/actions/playwright-chromium
      - name: Smoke (EN) weekly parity
        working-directory: playwright
        env:
          CI: "true"
        run: npm run test:smoke:en
      - uses: ./.github/actions/allure-with-history
        if: always() && hashFiles('playwright/reports/allure-results') != ''
        with:
          cache_prefix: allure-history-smoke-en
      - uses: actions/upload-artifact@v4
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        with:
          name: allure-report-smoke-en
          path: playwright/reports/allure-report/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-smoke-en
          path: playwright/test-results/

  e2e:
    needs: [smoke]
    if: ${{ (vars.ENABLE_PLAYWRIGHT_E2E == 'true' || github.event.schedule == '0 3 * * *') && (github.event_name != 'schedule' || github.event.schedule == '0 3 * * *') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - uses: ./.github/actions/playwright-chromium
      - name: E2E (FR) only — creates real COD orders on prod
        working-directory: playwright
        env:
          CI: "true"
        run: npm run test:e2e:fr
      - uses: ./.github/actions/allure-with-history
        if: always() && hashFiles('playwright/reports/allure-results') != ''
        with:
          cache_prefix: allure-history-e2e
      - uses: actions/upload-artifact@v4
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        with:
          name: allure-report-e2e
          path: playwright/reports/allure-report/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-e2e
          path: playwright/test-results/

  publish-report:
    needs: [smoke, smoke-en, e2e]
    if: |
      always() &&
      (needs.smoke.result == 'success' || needs.smoke.result == 'failure' || needs.smoke.result == 'skipped') &&
      (needs.smoke-en.result == 'success' || needs.smoke-en.result == 'failure' || needs.smoke-en.result == 'skipped') &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'failure' || needs.e2e.result == 'skipped') &&
      (needs.smoke.result != 'cancelled' && needs.smoke-en.result != 'cancelled' && needs.e2e.result != 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/report-pages
          sparse-checkout-cone-mode: false

      - name: Restore previous report site
        uses: actions/cache/restore@v4
        id: site-cache
        with:
          path: site
          key: qa-pages-site-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            qa-pages-site-${{ github.ref_name }}-

      - name: Download smoke Allure report
        uses: actions/download-artifact@v4
        continue-on-error: true
        id: smoke-artifact
        with:
          name: allure-report-smoke
          path: incoming/smoke

      - name: Download EN smoke Allure report
        uses: actions/download-artifact@v4
        continue-on-error: true
        id: smoke-en-artifact
        with:
          name: allure-report-smoke-en
          path: incoming/smoke-en

      - name: Download e2e Allure report
        uses: actions/download-artifact@v4
        continue-on-error: true
        id: e2e-artifact
        with:
          name: allure-report-e2e
          path: incoming/e2e

      - name: Build report site
        run: |
          mkdir -p site
          if [ -f incoming/smoke/index.html ]; then
            rm -rf site/smoke
            mv incoming/smoke site/smoke
          fi
          if [ -f incoming/smoke-en/index.html ]; then
            rm -rf site/smoke-en
            mv incoming/smoke-en site/smoke-en
          fi
          if [ -f incoming/e2e/index.html ]; then
            rm -rf site/e2e
            mv incoming/e2e site/e2e
          fi
          touch site/.nojekyll
          cp .github/report-pages/index.html site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Save report site cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: site
          key: qa-pages-site-${{ github.ref_name }}-${{ github.run_id }}

      - name: Report links
        if: always()
        run: |
          BASE="${{ steps.deployment.outputs.page_url }}"
          if [ -z "$BASE" ]; then
            BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi
          echo "### Allure reports" >> "$GITHUB_STEP_SUMMARY"
          echo "Trends/history build up over successive runs (cached per suite)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Dashboard](${BASE})" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Smoke FR](${BASE}smoke/)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Smoke EN (weekly)](${BASE}smoke-en/)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [E2E FR](${BASE}e2e/)" >> "$GITHUB_STEP_SUMMARY"
