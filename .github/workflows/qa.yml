# QA repo — all jobs on GitHub cloud. Storefront: Netlify preview; API: api.biomedica.ma.
name: QA

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
  schedule:
    # e2e-fr nightly (03:00 UTC).
    - cron: "0 3 * * *"
    # smoke-en nightly (04:00 UTC).
    - cron: "0 4 * * *"
    # e2e-en weekly (Monday 05:00 UTC).
    - cron: "0 5 * * 1"

permissions:
  contents: read

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PLAYWRIGHT_ORIGIN: ${{ vars.PLAYWRIGHT_ORIGIN || 'https://biomedica-test.netlify.app' }}
  PLAYWRIGHT_API_BASE_URL: ${{ vars.PLAYWRIGHT_API_BASE_URL || 'https://api.biomedica.ma' }}
  PLAYWRIGHT_TEST_PRODUCT_SLUG: ${{ vars.PLAYWRIGHT_TEST_PRODUCT_SLUG || 'argan-et-figue-de-barbarie-60ml' }}
  PLAYWRIGHT_WORKERS: "1"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - name: Typecheck Playwright specs
        run: npm ci --prefix playwright && npm run typecheck --prefix playwright

  smoke-fr:
    needs: [typecheck]
    if: |
      github.event_name != 'schedule' ||
      github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - uses: ./.github/actions/playwright-chromium
      - name: Smoke (FR) on Netlify storefront
        working-directory: playwright
        env:
          CI: "true"
        run: npm run test:smoke:fr
      - uses: ./.github/actions/allure-with-history
        if: always() && hashFiles('playwright/reports/allure-results') != ''
        with:
          cache_prefix: allure-history-smoke-fr
      - uses: actions/upload-artifact@v4
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        with:
          name: allure-report-smoke-fr
          path: playwright/reports/allure-report/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-smoke-fr
          path: playwright/test-results/

  smoke-en:
    needs: [typecheck]
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - uses: ./.github/actions/playwright-chromium
      - name: Smoke (EN) nightly parity
        working-directory: playwright
        env:
          CI: "true"
        run: npm run test:smoke:en
      - uses: ./.github/actions/allure-with-history
        if: always() && hashFiles('playwright/reports/allure-results') != ''
        with:
          cache_prefix: allure-history-smoke-en
      - uses: actions/upload-artifact@v4
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        with:
          name: allure-report-smoke-en
          path: playwright/reports/allure-report/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-smoke-en
          path: playwright/test-results/

  e2e-fr:
    needs: [smoke-fr]
    if: |
      vars.ENABLE_PLAYWRIGHT_E2E == 'true' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - uses: ./.github/actions/playwright-chromium
      - name: E2E (FR) — creates real COD orders on prod
        working-directory: playwright
        env:
          CI: "true"
        run: npm run test:e2e:fr
      - uses: ./.github/actions/allure-with-history
        if: always() && hashFiles('playwright/reports/allure-results') != ''
        with:
          cache_prefix: allure-history-e2e-fr
      - uses: actions/upload-artifact@v4
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        with:
          name: allure-report-e2e-fr
          path: playwright/reports/allure-report/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-e2e-fr
          path: playwright/test-results/

  e2e-en:
    needs: [typecheck]
    if: github.event_name == 'schedule' && github.event.schedule == '0 5 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - uses: ./.github/actions/playwright-chromium
      - name: E2E (EN) weekly — creates real COD orders on prod
        working-directory: playwright
        env:
          CI: "true"
        run: npm run test:e2e:en
      - uses: ./.github/actions/allure-with-history
        if: always() && hashFiles('playwright/reports/allure-results') != ''
        with:
          cache_prefix: allure-history-e2e-en
      - uses: actions/upload-artifact@v4
        if: always() && hashFiles('playwright/reports/allure-report/index.html') != ''
        with:
          name: allure-report-e2e-en
          path: playwright/reports/allure-report/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-e2e-en
          path: playwright/test-results/

  publish-report:
    needs: [smoke-fr, smoke-en, e2e-fr, e2e-en]
    if: |
      always() &&
      (needs.smoke-fr.result == 'success' || needs.smoke-fr.result == 'failure' || needs.smoke-fr.result == 'skipped') &&
      (needs.smoke-en.result == 'success' || needs.smoke-en.result == 'failure' || needs.smoke-en.result == 'skipped') &&
      (needs.e2e-fr.result == 'success' || needs.e2e-fr.result == 'failure' || needs.e2e-fr.result == 'skipped') &&
      (needs.e2e-en.result == 'success' || needs.e2e-en.result == 'failure' || needs.e2e-en.result == 'skipped') &&
      (needs.smoke-fr.result != 'cancelled' && needs.smoke-en.result != 'cancelled' &&
       needs.e2e-fr.result != 'cancelled' && needs.e2e-en.result != 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/report-pages
          sparse-checkout-cone-mode: false

      - name: Restore previous report site
        uses: actions/cache/restore@v4
        id: site-cache
        with:
          path: site
          key: qa-pages-site-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            qa-pages-site-${{ github.ref_name }}-

      - name: Download smoke-fr Allure report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-report-smoke-fr
          path: incoming/smoke-fr

      - name: Download smoke-en Allure report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-report-smoke-en
          path: incoming/smoke-en

      - name: Download e2e-fr Allure report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-report-e2e-fr
          path: incoming/e2e-fr

      - name: Download e2e-en Allure report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-report-e2e-en
          path: incoming/e2e-en

      - name: Build report site
        run: |
          mkdir -p site
          if [ -f incoming/smoke-fr/index.html ]; then
            rm -rf site/smoke-fr
            mv incoming/smoke-fr site/smoke-fr
          fi
          if [ -f incoming/smoke-en/index.html ]; then
            rm -rf site/smoke-en
            mv incoming/smoke-en site/smoke-en
          fi
          if [ -f incoming/e2e-fr/index.html ]; then
            rm -rf site/e2e-fr
            mv incoming/e2e-fr site/e2e-fr
          fi
          if [ -f incoming/e2e-en/index.html ]; then
            rm -rf site/e2e-en
            mv incoming/e2e-en site/e2e-en
          fi
          touch site/.nojekyll
          cp .github/report-pages/index.html site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Save report site cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: site
          key: qa-pages-site-${{ github.ref_name }}-${{ github.run_id }}

      - name: Report links
        if: always()
        run: |
          BASE="${{ steps.deployment.outputs.page_url }}"
          if [ -z "$BASE" ]; then
            BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi
          echo "### Allure reports" >> "$GITHUB_STEP_SUMMARY"
          echo "Trends/history build up over successive runs (cached per suite)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Dashboard](${BASE})" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Smoke FR](${BASE}smoke-fr/)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Smoke EN](${BASE}smoke-en/)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [E2E FR](${BASE}e2e-fr/)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [E2E EN](${BASE}e2e-en/)" >> "$GITHUB_STEP_SUMMARY"
